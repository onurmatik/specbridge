<div data-auth-modal class="fixed inset-0 z-50 hidden bg-gray-900/60 px-4 py-8 backdrop-blur-sm">
  <div class="flex min-h-full items-center justify-center">
    <div class="workspace-panel relative max-h-[calc(100vh-4rem)] w-full max-w-2xl overflow-y-auto shadow-paper">
      <button
        type="button"
        data-auth-modal-close
        class="absolute right-5 top-5 z-10 rounded-full p-2 text-gray-400 transition-colors hover:bg-gray-100 hover:text-gray-900"
        aria-label="Close authentication dialog"
      >
        <iconify-icon icon="lucide:x" class="text-xl"></iconify-icon>
      </button>

      <div>
        <section class="mx-auto flex min-h-[680px] w-full max-w-xl flex-col p-8 sm:p-10">
          <div class="mb-6 flex rounded-xl border border-gray-200 bg-gray-50 p-1">
            <button type="button" data-auth-tab-button="login" class="flex-1 rounded-lg px-4 py-3 text-sm font-medium text-gray-900 transition-colors">Sign In</button>
            <button type="button" data-auth-tab-button="signup" class="flex-1 rounded-lg px-4 py-3 text-sm font-medium text-gray-500 transition-colors">Create Account</button>
          </div>

          <section data-auth-panel="login">
            <div class="mb-6">
              <h3 class="font-display text-3xl font-bold tracking-tight text-gray-900">Welcome back</h3>
              <p class="mt-2 text-sm text-gray-500">Continue from the public preview into the full workspace.</p>
            </div>
            <div data-auth-errors="login" class="mb-5 hidden rounded-xl border border-red-100 bg-red-50 px-4 py-3 text-sm text-red-700"></div>
            <form method="post" action="{% url 'login' %}" data-auth-form="login" class="space-y-5">
              {% csrf_token %}
              <input type="hidden" name="next" value="{{ request.get_full_path }}">
              <div>
                <label class="mb-2 block text-sm font-medium text-gray-700">Username or email</label>
                <input
                  type="text"
                  name="username"
                  autocomplete="username"
                  placeholder="sarah or sarah@example.com"
                  class="w-full rounded-xl border border-gray-200 bg-white px-4 py-3 text-sm text-gray-900 placeholder-gray-400 focus:border-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-200"
                >
                <p data-auth-field-error="login:username" class="mt-2 hidden text-sm text-red-600"></p>
              </div>
              <div>
                <label class="mb-2 block text-sm font-medium text-gray-700">Password</label>
                <input
                  type="password"
                  name="password"
                  autocomplete="current-password"
                  placeholder="Enter your password"
                  class="w-full rounded-xl border border-gray-200 bg-white px-4 py-3 text-sm text-gray-900 placeholder-gray-400 focus:border-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-200"
                >
                <p data-auth-field-error="login:password" class="mt-2 hidden text-sm text-red-600"></p>
              </div>
              <button type="submit" class="primary-button w-full justify-center">
                <iconify-icon icon="lucide:log-in"></iconify-icon>
                Log In
              </button>
            </form>
            <p class="mt-6 text-sm text-gray-500">
              Need an account?
              <button type="button" data-auth-switch="signup" class="font-medium text-gray-900 hover:underline">Create one</button>
            </p>
          </section>

          <section data-auth-panel="signup" class="hidden">
            <div class="mb-6">
              <h3 class="font-display text-3xl font-bold tracking-tight text-gray-900">Create your account</h3>
              <p class="mt-2 text-sm text-gray-500">New users are signed in immediately and added to the primary workspace as viewers.</p>
            </div>
            <div data-auth-errors="signup" class="mb-5 hidden rounded-xl border border-red-100 bg-red-50 px-4 py-3 text-sm text-red-700"></div>
            <form method="post" action="{% url 'signup' %}" data-auth-form="signup" class="space-y-5">
              {% csrf_token %}
              <input type="hidden" name="next" value="{{ request.get_full_path }}">
              <div class="grid gap-5 sm:grid-cols-2">
                <div>
                  <label class="mb-2 block text-sm font-medium text-gray-700">First name</label>
                  <input
                    type="text"
                    name="first_name"
                    autocomplete="given-name"
                    placeholder="Sarah"
                    class="w-full rounded-xl border border-gray-200 bg-white px-4 py-3 text-sm text-gray-900 placeholder-gray-400 focus:border-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-200"
                  >
                  <p data-auth-field-error="signup:first_name" class="mt-2 hidden text-sm text-red-600"></p>
                </div>
                <div>
                  <label class="mb-2 block text-sm font-medium text-gray-700">Last name</label>
                  <input
                    type="text"
                    name="last_name"
                    autocomplete="family-name"
                    placeholder="Stone"
                    class="w-full rounded-xl border border-gray-200 bg-white px-4 py-3 text-sm text-gray-900 placeholder-gray-400 focus:border-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-200"
                  >
                  <p data-auth-field-error="signup:last_name" class="mt-2 hidden text-sm text-red-600"></p>
                </div>
              </div>
              <div class="grid gap-5 sm:grid-cols-2">
                <div>
                  <label class="mb-2 block text-sm font-medium text-gray-700">Username</label>
                  <input
                    type="text"
                    name="username"
                    autocomplete="username"
                    placeholder="sarah"
                    class="w-full rounded-xl border border-gray-200 bg-white px-4 py-3 text-sm text-gray-900 placeholder-gray-400 focus:border-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-200"
                  >
                  <p data-auth-field-error="signup:username" class="mt-2 hidden text-sm text-red-600"></p>
                </div>
                <div>
                  <label class="mb-2 block text-sm font-medium text-gray-700">Email</label>
                  <input
                    type="email"
                    name="email"
                    autocomplete="email"
                    placeholder="you@example.com"
                    class="w-full rounded-xl border border-gray-200 bg-white px-4 py-3 text-sm text-gray-900 placeholder-gray-400 focus:border-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-200"
                  >
                  <p data-auth-field-error="signup:email" class="mt-2 hidden text-sm text-red-600"></p>
                </div>
              </div>
              <div class="grid gap-5 sm:grid-cols-2">
                <div>
                  <label class="mb-2 block text-sm font-medium text-gray-700">Organization</label>
                  <input
                    type="text"
                    name="organization"
                    autocomplete="organization"
                    placeholder="Acme"
                    class="w-full rounded-xl border border-gray-200 bg-white px-4 py-3 text-sm text-gray-900 placeholder-gray-400 focus:border-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-200"
                  >
                  <p data-auth-field-error="signup:organization" class="mt-2 hidden text-sm text-red-600"></p>
                </div>
                <div>
                  <label class="mb-2 block text-sm font-medium text-gray-700">Title</label>
                  <input
                    type="text"
                    name="title"
                    autocomplete="organization-title"
                    placeholder="Product Manager"
                    class="w-full rounded-xl border border-gray-200 bg-white px-4 py-3 text-sm text-gray-900 placeholder-gray-400 focus:border-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-200"
                  >
                  <p data-auth-field-error="signup:title" class="mt-2 hidden text-sm text-red-600"></p>
                </div>
              </div>
              <div class="grid gap-5 sm:grid-cols-2">
                <div>
                  <label class="mb-2 block text-sm font-medium text-gray-700">Password</label>
                  <input
                    type="password"
                    name="password1"
                    autocomplete="new-password"
                    placeholder="Create a password"
                    class="w-full rounded-xl border border-gray-200 bg-white px-4 py-3 text-sm text-gray-900 placeholder-gray-400 focus:border-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-200"
                  >
                  <p data-auth-field-error="signup:password1" class="mt-2 hidden text-sm text-red-600"></p>
                </div>
                <div>
                  <label class="mb-2 block text-sm font-medium text-gray-700">Confirm password</label>
                  <input
                    type="password"
                    name="password2"
                    autocomplete="new-password"
                    placeholder="Repeat your password"
                    class="w-full rounded-xl border border-gray-200 bg-white px-4 py-3 text-sm text-gray-900 placeholder-gray-400 focus:border-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-200"
                  >
                  <p data-auth-field-error="signup:password2" class="mt-2 hidden text-sm text-red-600"></p>
                </div>
              </div>
              <button type="submit" class="primary-button w-full justify-center">
                <iconify-icon icon="lucide:user-plus"></iconify-icon>
                Create Account
              </button>
            </form>
            <p class="mt-6 text-sm text-gray-500">
              Already have an account?
              <button type="button" data-auth-switch="login" class="font-medium text-gray-900 hover:underline">Log in</button>
            </p>
          </section>
        </section>
      </div>
    </div>
  </div>
</div>
