<div data-project-settings-surface class="flex h-full flex-col bg-white">
  <div class="px-8 py-8 sm:px-10">
    <div class="pr-12">
      <h3 class="font-display text-3xl font-bold tracking-tight text-gray-900">Project Settings</h3>
      <p class="mt-2 text-sm text-gray-500">Update identity fields and shared output preferences.</p>
    </div>

    <div class="mt-6">
      <div class="flex items-center gap-6" role="tablist" aria-label="Project settings sections">
        <button
          id="project-settings-tab-identity"
          type="button"
          data-project-settings-tab-button="identity"
          role="tab"
          aria-selected="true"
          aria-controls="project-settings-panel-identity"
          class="border-b-2 border-gray-900 px-1 pb-3 text-sm font-medium text-gray-900 transition-colors"
        >
          Project identity
        </button>
        <button
          id="project-settings-tab-preferences"
          type="button"
          data-project-settings-tab-button="preferences"
          role="tab"
          aria-selected="false"
          aria-controls="project-settings-panel-preferences"
          class="border-b-2 border-transparent px-1 pb-3 text-sm font-medium text-gray-500 transition-colors hover:text-gray-900"
        >
          Preferences
        </button>
      </div>
    </div>
  </div>

  <form method="post" action="/api/projects/{{ project.slug }}/settings" data-project-settings-form class="flex min-h-0 flex-1 flex-col">
    {% csrf_token %}
    <div class="min-h-0 flex-1 overflow-y-auto px-8 py-6 sm:px-10">
      <div data-project-settings-errors class="mb-5 hidden rounded-xl border border-red-100 bg-red-50 px-4 py-3 text-sm text-red-700"></div>

      <section
        id="project-settings-panel-identity"
        data-project-settings-panel="identity"
        role="tabpanel"
        aria-labelledby="project-settings-tab-identity"
        class="space-y-4"
      >
        <div>
          <label class="mb-2 block text-sm font-medium text-gray-700">Project title</label>
          <input
            type="text"
            name="project_name"
            value="{{ project.name }}"
            class="w-full rounded-xl border border-gray-200 bg-white px-4 py-3 text-sm text-gray-900 placeholder-gray-400 focus:border-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-200"
          >
          <p data-project-settings-field-error="project_name" class="mt-2 hidden text-sm text-red-600"></p>
        </div>

        <div>
          <label class="mb-2 block text-sm font-medium text-gray-700">Tagline</label>
          <textarea
            name="tagline"
            rows="3"
            placeholder="Optional. Leave blank to regenerate the default tagline."
            class="w-full rounded-xl border border-gray-200 bg-white px-4 py-3 text-sm text-gray-900 placeholder-gray-400 focus:border-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-200"
          >{{ project.tagline }}</textarea>
          <p data-project-settings-field-error="tagline" class="mt-2 hidden text-sm text-red-600"></p>
        </div>
      </section>

      <section
        id="project-settings-panel-preferences"
        data-project-settings-panel="preferences"
        role="tabpanel"
        aria-labelledby="project-settings-tab-preferences"
        class="hidden space-y-4"
        hidden
      >
        <div>
          <label class="mb-2 block text-sm font-medium text-gray-700">Spec language</label>
          <select
            name="spec_language"
            class="w-full rounded-xl border border-gray-200 bg-white px-4 py-3 text-sm text-gray-900 focus:border-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-200"
          >
            {% for value, label in project_spec_language_choices %}
              <option value="{{ value }}"{% if project.spec_language == value %} selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
          <p class="mt-2 text-sm text-gray-500">Language of the output documents; you can still interact with the agent using any language.</p>
          <p data-project-settings-field-error="spec_language" class="mt-2 hidden text-sm text-red-600"></p>
        </div>
      </section>
    </div>

    <div class="border-t border-gray-200 bg-white px-8 py-5 sm:px-10">
      <div class="flex flex-col-reverse gap-3 sm:flex-row sm:justify-end">
        <button type="button" data-project-settings-modal-close class="secondary-button">Cancel</button>
        <button type="submit" data-project-settings-submit class="primary-button">
          <iconify-icon icon="lucide:save"></iconify-icon>
          Save Changes
        </button>
      </div>
    </div>
  </form>
</div>
